name: Send Monday Analytics Email

on:
  schedule:
    # Runs every Monday at 11:00 AM IST (5:30 AM UTC)
    - cron: '30 5 * * 1'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  send-email:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'   # ✅ Upgraded from 3.9
      
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      
      - name: Install dependencies
        run: |
          pip install pandas google-genai python-dotenv plotly streamlit
      
      - name: Create .env file
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          SMTP_SERVER=${{ secrets.SMTP_SERVER }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
          DEFAULT_RECIPIENT_EMAIL=${{ secrets.DEFAULT_RECIPIENT_EMAIL }}
          EOF
      
      - name: Run Email Script
        run: python App1.py
